name: CI

# Phase 10 (plan §19): verification only — this workflow never applies a
# migration to any hosted project and never deploys anything. Applying
# migrations to production requires an explicit human running
# `make db-push` with their own Supabase credentials (see docs/DEPLOYMENT.md)
# — CI intentionally has no path to do that, so there is no "approval gate"
# to accidentally bypass here.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-and-deps:
    name: Secret scan + dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan (tracked files)
        run: python3 scripts/check_secrets.py
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: npm audit (high+ only — do not fail CI on low-severity noise)
        working-directory: web
        run: npm audit --audit-level=high
        continue-on-error: true # advisory: dependency audits shift under us; don't block merges on a transitive low/moderate finding
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: pip-audit (advisory)
        working-directory: ingest
        run: |
          pip install --quiet pip-audit
          pip install --quiet -r requirements.txt
          pip-audit || true

  web:
    name: Web — typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit
      - name: Unit tests (vitest)
        working-directory: web
        run: npm test
      - name: Production build
        working-directory: web
        run: npm run build

  python:
    name: Ingest — compile + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ingest/requirements.txt
      - name: Install dependencies
        working-directory: ingest
        run: pip install -r requirements.txt
      - name: Compile check
        working-directory: ingest
        run: python -m py_compile app/*.py
      - name: pytest (fully mocked — no live Supabase/OpenAQ/SMTP)
        working-directory: ingest
        run: python -m pytest tests/ -q

  database:
    name: Database — migrations, RLS suite, idempotency, type drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run full local DB/RLS suite (rebuilds schema, checks idempotency, runs every test file)
        run: bash supabase/tests/run.sh
      - name: Regenerate types from the just-verified local schema and diff against the committed file
        run: |
          npx --yes supabase gen types typescript --db-url "postgresql://postgres:postgres@localhost:55432/vayugati" > /tmp/generated.ts
          {
            echo "// Generated by \`supabase gen types typescript\`. Do not edit by hand."
            echo "//"
            echo "// Provenance: generated from supabase/schema.sql + every file in"
            echo "// supabase/migrations/ applied in order to a disposable local Postgres, because"
            echo "// generating from the hosted project needs the project owner's \`supabase login\`"
            echo "// (see Makefile \`gen-types\`). Regenerate with \`make gen-types\` once the"
            echo "// migrations are pushed, and this file should come back byte-identical apart"
            echo "// from anything applied to the hosted DB outside of migrations/."
            cat /tmp/generated.ts
          } > /tmp/generated-with-header.ts
          if ! diff -q /tmp/generated-with-header.ts web/src/lib/database.types.ts > /dev/null; then
            echo "::error::web/src/lib/database.types.ts is out of date with supabase/migrations/. Run 'make gen-types' (see docs/DEPLOYMENT.md) and commit the result."
            diff /tmp/generated-with-header.ts web/src/lib/database.types.ts || true
            exit 1
          fi
          echo "database.types.ts matches the local schema exactly — no drift."

  hosted-drift-check:
    name: Hosted drift check (informational — never fails the build)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Report which migrations have reached the hosted project
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "SUPABASE_URL/SUPABASE_SERVICE_ROLE_KEY repo secrets not set — skipping (this is informational only, never required)."
            exit 0
          fi
          python3 supabase/scripts/check_hosted_drift.py
        continue-on-error: true # informational only — see docs/DEPLOYMENT.md's own migration-safety plan for why this never blocks a merge
