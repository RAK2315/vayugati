# docs/data/delhi-safe-station-import-report.md) ---
# These 15 are the official Delhi stations from the expansion report's
# 18-station "needs manual review" backlog that a real point-in-polygon
# test (shapely, against the 252 imported ward boundary polygons) placed
# uniquely inside one ward, well clear of any boundary edge — geometry,
# never a name guess. 3 of the 18 are deliberately NOT here: ITO (~30m
# from a boundary), and both Pusa stations (DPCC id=6356, IMD id=5404 —
# their point falls inside two polygons that genuinely overlap in the
# imported data). All three need a human call on a higher-precision
# source before import, not this file.
