    openaq_location_id: 5626   # DTU, New Delhi - CPCB
  - ward: KAKROLA
    openaq_location_id: 5622   # NSIT Dwarka, New Delhi - CPCB
  - ward: MOTI NAGAR
    openaq_location_id: 5630   # Shadipur, New Delhi - CPCB
  - ward: CHIRAG DELHI
    openaq_location_id: 5586   # Siri Fort, New Delhi - CPCB
  - ward: SANGAM VIHAR-B
    openaq_location_id: 6934   # Dr. Karni Singh Shooting Range, Delhi - DPCC
  - ward: ANDREWS GANJ
    openaq_location_id: 6957   # Jawaharlal Nehru Stadium, Delhi - DPCC
  - ward: LAJPAT NAGAR
    openaq_location_id: 8365   # Nehru Nagar, Delhi - DPCC
  - ward: HAUZ KHAS
    openaq_location_id: 10484  # Sri AurobindoMarg (Sri Aurobindo Marg), Delhi - DPCC
  - ward: DHIRPUR
    openaq_location_id: 5541   # Burari Crossing, New Delhi - IMD (geometry places it in
                                # DHIRPUR, not BURARI - the landmark name doesn't match the
                                # ward polygon; see the geospatial audit)
  - ward: SRI NIWAS PURI
    openaq_location_id: 5627   # CRRI Mathura Road, New Delhi - IMD
  - ward: BALJEET NAGAR
    openaq_location_id: 5610   # North Campus, DU, New Delhi - IMD
  # geometry_matched_but_admin_boundary_needs_review: the following 4 all
  # point-in-polygon match into "New Delhi (NDMC)" (wards.id=516), but that
  # polygon's own OSM metadata (osm_official_name: "New Delhi District",
  # admin_level 5, ~162 km^2) shows it is NOT the true, much smaller NDMC
  # municipal jurisdiction (~43 km^2) its wards.name implies - it was
  # imported under a name that doesn't match what it actually contains
  # (see the geospatial audit report §6.1). The point-in-polygon match
  # itself is correct and safe (each station is genuinely, unambiguously
  # inside this polygon); what needs review is only whether this oversized
  # district-level polygon is the right ward-level bucket for four stations
  # spread ~11km apart (Lodhi Road to IGI Airport) to share. Imported as-is
  # per the audit's "safe" classification - flagged here, not blocked.
  - ward: New Delhi (NDMC)
    openaq_location_id: 6929   # Major Dhyan Chand National Stadium, Delhi - DPCC
                                # geometry_matched_but_admin_boundary_needs_review
  - ward: New Delhi (NDMC)
    openaq_location_id: 6358   # MandirMarg (Mandir Marg), New Delhi - DPCC
                                # geometry_matched_but_admin_boundary_needs_review
  - ward: New Delhi (NDMC)
    openaq_location_id: 5650   # IGI Airport Terminal - 3, New Delhi - IMD
                                # geometry_matched_but_admin_boundary_needs_review
  - ward: New Delhi (NDMC)
    openaq_location_id: 5634   # Lodhi Road, New Delhi - IMD
                                # geometry_matched_but_admin_boundary_needs_review
